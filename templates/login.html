{% extends 'base.html' %}

{% block title %}Login - VoteChain System{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card animate-fade-in">
        <div class="auth-header">
            <div class="auth-logo">
                <i class="fa-solid fa-cube logo-icon"></i>
            </div>
            <h2>Welcome to VoteChain</h2>
            <p>Decentralized Cryptographical Voting Portal</p>
        </div>
        
        <!-- Role Tabs Toggle -->
        <div class="auth-tabs">
            <button class="auth-tab active" data-role="voter" id="tab-voter">
                <i class="fa-solid fa-user"></i> Voter Login
            </button>
            <button class="auth-tab" data-role="admin" id="tab-admin">
                <i class="fa-solid fa-user-shield"></i> Admin Login
            </button>
        </div>
        
        <form class="auth-form" id="login-form">
            <!-- Hidden input to track role selection -->
            <input type="hidden" name="role" id="login-role" value="voter">
            
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-with-icon">
                    <i class="fa-regular fa-user"></i>
                    <input type="text" id="username" name="username" placeholder="Enter username" required autocomplete="username">
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-with-icon">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="Enter password" required autocomplete="current-password">
                </div>
            </div>
            
            <!-- Toast alerts placeholder inside form -->
            <div class="alert-message error hidden" id="login-error-msg">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <span class="message-text">Invalid credentials.</span>
            </div>
            
            <button type="submit" class="btn-primary auth-submit-btn" id="btn-login-submit">
                <span>Sign In Securely</span>
                <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
        </form>
        
        <div class="auth-footer" id="voter-register-prompt">
            <p>New voter? <a href="/register" class="link-highlight">Create a secure profile</a></p>
        </div>
    </div>
</div>
{% endblock %}
